<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AlphaTraderAI Pro V5.0｜AI 圍棋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div class="brand">AlphaTraderAI Pro V5.0</div>
      <div class="sub">股票 AI × AI 圍棋平台</div>
    </header>
    <section class="hero">
      <h1>汐止圍棋club AI Studio</h1>
      <p>創立於 1985｜朱老師 AI 圍棋教室</p>
      <strong>AI 對局 × 實戰解析 × 棋力提升</strong>
    </section>
    <section class="match">
      <div class="tag">AI 挑戰賽 #001</div>
      <h2>AI（9D）讓四子 vs 小林（6D）</h2>
      <p id="gameInfo">已內建示範 SGF，也可自行讀取 SGF。</p>
    </section>
    <section class="controls">
      <label class="btn">📂 讀取 SGF<input id="fileInput" type="file" accept=".sgf"></label>
      <button id="sampleBtn">載入示範棋譜</button>
      <button id="prevBtn">⏮ 上一步</button>
      <button id="playBtn">▶ 播放</button>
      <button id="nextBtn">⏭ 下一步</button>
      <select id="speedSel"><option value="1400">0.5×</option><option value="800" selected>1×</option><option value="400">2×</option></select>
    </section>
    <section class="status"><span id="moveText">第 0 手</span><span id="coordText">準備開始</span></section>
    <section class="boardBox"><canvas id="board" width="900" height="900"></canvas></section>
    <footer>汐止圍棋club｜朱老師 AI 圍棋教室｜0931-399-910<br>Build 001.2a：SGF 播放器第一版</footer>
  </main>
  <script src="sample_sgf.js"></script><script src="sgf.js"></script><script src="board.js"></script><script src="app.js"></script>
</body>
</html>
