<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AlphaTraerAI V3.0｜朱老師 AI 投資中心</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <div class="version">AlphaTraerAI V3.0</div>
      <h1>朱老師 AI 投資中心</h1>
      <p>台股分析・AI 評分・持股損益・交易紀錄・iPad 版</p>
    </div>
    <button id="themeBtn">切換深色</button>
  </header>

  <main class="grid">
    <section class="card market">
      <h2>今日大盤</h2>
      <div class="big">加權指數 23,880.36</div>
      <div class="up">▲ 168.52（+0.71%）</div>
      <small>示範資料｜可後續串接即時行情 API</small>
    </section>

    <section class="card">
      <h2>自選股</h2>
      <div id="watchList"></div>
      <div class="row">
        <input id="stockCode" placeholder="代號 例：2454" />
        <input id="stockName" placeholder="名稱 例：聯發科" />
        <button id="addBtn">新增</button>
      </div>
    </section>

    <section class="card analysis">
      <h2>AI 分析</h2>
      <div id="selectedStock" class="selected-title">請選擇股票</div>
      <div class="score">★★★★☆</div>
      <div id="aiText" class="ai-text">點選左側自選股後，系統會顯示 AI 評分與操作建議。</div>
      <div class="signal" id="signal">觀望</div>
    </section>

    <section class="card chart-card">
      <h2>K 線趨勢圖</h2>
      <canvas id="chart" width="900" height="360"></canvas>
      <div class="indicators">
        <span>RSI：62</span><span>KD：黃金交叉</span><span>MACD：翻紅</span><span>MA20：向上</span>
      </div>
    </section>

    <section class="card">
      <h2>持股損益試算</h2>
      <div class="row wrap">
        <input id="holdCode" placeholder="股票代號" />
        <input id="cost" type="number" placeholder="買進成本" />
        <input id="shares" type="number" placeholder="股數" />
        <input id="price" type="number" placeholder="現價" />
        <button id="calcBtn">計算</button>
      </div>
      <div id="profitResult" class="result">輸入成本、股數、現價後可試算損益。</div>
    </section>

    <section class="card">
      <h2>交易紀錄</h2>
      <div class="row wrap">
        <input id="tradeDate" type="date" />
        <input id="tradeCode" placeholder="代號" />
        <select id="tradeType"><option>買進</option><option>賣出</option></select>
        <input id="tradePrice" type="number" placeholder="成交價" />
        <input id="tradeShares" type="number" placeholder="股數" />
        <button id="tradeBtn">加入紀錄</button>
      </div>
      <table><thead><tr><th>日期</th><th>股票</th><th>動作</th><th>價格</th><th>股數</th></tr></thead><tbody id="tradeBody"></tbody></table>
    </section>
  </main>

  <footer>AlphaTraerAI V3.0｜僅供學習與試算，不構成投資建議。</footer>
  <script src="script.js"></script>
</body>
</html>
