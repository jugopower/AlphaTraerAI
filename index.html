<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AlphaTraerAI V2.0｜朱老師 AI 投資中心</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">AlphaTraerAI V2.0</p>
      <h1>朱老師 AI 投資中心</h1>
      <p class="subtitle">台股觀察、技術分析、AI 訊號與交易紀錄的一頁式流程。</p>
    </div>
    <button id="themeBtn">切換深色</button>
  </header>

  <main class="layout">
    <aside class="panel watchlist">
      <h2>自選股</h2>
      <div id="stockList"></div>
      <p class="note">示範資料僅供學習，不構成投資建議。</p>
    </aside>

    <section class="content">
      <div class="hero panel">
        <div>
          <p class="tag">目前標的</p>
          <h2 id="stockName">0050 元大台灣50</h2>
          <p id="stockMeta">ETF｜大型權值股</p>
        </div>
        <div class="signal" id="aiSignal">觀望</div>
      </div>

      <section class="cards">
        <article class="metric panel"><span>現價</span><strong id="price">--</strong></article>
        <article class="metric panel"><span>漲跌</span><strong id="change">--</strong></article>
        <article class="metric panel"><span>RSI</span><strong id="rsi">--</strong></article>
        <article class="metric panel"><span>勝率評估</span><strong id="prob">--</strong></article>
      </section>

      <section class="panel">
        <div class="sectionHead">
          <h2>技術分析流程</h2>
          <button id="runBtn">重新分析</button>
        </div>
        <div class="chart" id="chart"></div>
        <div class="steps" id="steps"></div>
      </section>

      <section class="grid2">
        <article class="panel">
          <h2>AI 操作建議</h2>
          <p id="advice" class="advice">請選擇標的。</p>
          <ul class="rules">
            <li>上漲機率 ≥ 55%：可列入觀察建倉</li>
            <li>跌破風控線：減碼或停損</li>
            <li>盤勢不明：保留現金，不追高</li>
          </ul>
        </article>
        <article class="panel">
          <h2>交易紀錄</h2>
          <form id="tradeForm">
            <input id="tradeText" placeholder="例：0050 觀察，等待突破月線" />
            <button>新增</button>
          </form>
          <ul id="tradeLog" class="log"></ul>
        </article>
      </section>
    </section>
  </main>

  <footer>© 2026 朱老師 AI 投資中心｜AlphaTraerAI V2.0</footer>
  <script src="script.js"></script>
</body>
</html>
