<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AlphaTraerAI V2.2｜朱老師 AI 投資中心</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <div class="version">AlphaTraerAI V2.2</div>
      <h1>朱老師 AI 投資中心</h1>
      <p>可操作版：自選股切換、持股紀錄、損益試算與本機儲存。</p>
    </div>
    <button id="themeBtn">切換深色</button>
  </header>

  <main class="layout">
    <section class="card">
      <h2>自選股</h2>
      <div class="watchlist" id="watchlist"></div>
      <div class="add-row">
        <input id="symbolInput" placeholder="代號 例：2454" />
        <input id="nameInput" placeholder="名稱 例：聯發科" />
        <button id="addStockBtn">新增</button>
      </div>
      <p class="note">示範資料僅供學習，不構成投資建議。</p>
    </section>

    <section class="card focus">
      <div class="label">目前標的</div>
      <h2 id="stockTitle">0050 元大台灣50</h2>
      <p id="stockType">ETF｜大型權值股</p>
      <div class="signal" id="signal">買進觀察</div>
    </section>

    <section class="grid cards4">
      <div class="card stat"><span>現價</span><b id="price">188.4</b></div>
      <div class="card stat"><span>漲跌</span><b id="change">+0.8%</b></div>
      <div class="card stat"><span>RSI</span><b id="rsi">58</b></div>
      <div class="card stat"><span>勝率評估</span><b id="score">61%</b></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>技術分析流程</h2>
        <button id="reanalyzeBtn">重新分析</button>
      </div>
      <ol id="analysisList" class="steps"></ol>
    </section>

    <section class="card">
      <h2>我的持股試算</h2>
      <div class="trade-form">
        <input id="buyPrice" type="number" step="0.1" placeholder="買進價格" />
        <input id="shares" type="number" step="1" placeholder="股數" />
        <button id="saveHoldingBtn">儲存持股</button>
      </div>
      <div id="holdingResult" class="result">尚未輸入持股。</div>
    </section>

    <section class="card">
      <h2>交易日誌</h2>
      <textarea id="journal" placeholder="記錄今日觀察、買賣理由、風險提醒……"></textarea>
      <button id="saveJournalBtn">儲存日誌</button>
      <p class="note">資料會儲存在本機瀏覽器，下次開啟仍可保留。</p>
    </section>
  </main>

  <footer>AlphaTraerAI V2.2｜教學示範系統｜請自行判斷投資風險</footer>
  <script src="script.js"></script>
</body>
</html>
